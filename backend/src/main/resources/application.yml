# ============================================================================
# Jobbed Backend – Basiskonfiguration (profilübergreifend)
# Profil-spezifische Werte in application-{dev,test,prod}.yml
# ============================================================================
spring:
  application:
    name: jobbed
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobbed}
    username: ${SPRING_DATASOURCE_USERNAME:jobbed}
    password: ${SPRING_DATASOURCE_PASSWORD:jobbed}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      # Schema wird ausschließlich über Flyway verwaltet.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        # Batch-Laden lazy Assoziationen -> vermeidet N+1 bei Listen.
        default_batch_fetch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  servlet:
    multipart:
      max-file-size: ${FILE_UPLOAD_MAX_SIZE_MB:10}MB
      max-request-size: ${FILE_UPLOAD_MAX_SIZE_MB:10}MB

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
  forward-headers-strategy: framework

# App-spezifische Eigenschaften
app:
  ai:
    provider: ${AI_PROVIDER:disabled}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-5-mini}
  job-analysis:
    provider: ${JOB_ANALYSIS_PROVIDER:rules}
  version: 0.1.0
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  mail:
    from: ${MAIL_FROM:no-reply@jobbed.local}
  file-storage:
    local-path: ${FILE_STORAGE_LOCAL_PATH:./uploads}
    max-size-mb: ${FILE_UPLOAD_MAX_SIZE_MB:10}
  auth:
    # In prod MUSS JWT_SECRET gesetzt sein (>= 32 Byte). dev/test setzen einen Default.
    jwt-secret: ${JWT_SECRET:}
    frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:4200}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:604800}
    verification-token-ttl-minutes: ${AUTH_VERIFICATION_TTL_MINUTES:1440}
    reset-token-ttl-minutes: ${AUTH_RESET_TTL_MINUTES:30}
    cookie:
      name: refreshToken
      path: /api/v1/auth
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Strict}

# Actuator: Health inkl. Liveness/Readiness-Probes
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Jobbed
    version: 0.1.0

# OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: INFO
    com.jobbed: INFO
