<app-auth-shell title="Anmelden" subtitle="Willkommen zurück bei Jobbed.">
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    @if (errorMessage()) {
      <p class="auth-error" role="alert">{{ errorMessage() }}</p>
    }

    <label class="auth-field">
      <span>E-Mail</span>
      <input class="input" type="email" formControlName="email" autocomplete="email" required />
      @if (form.controls.email.hasError('required') && form.controls.email.touched) {
        <small>E-Mail-Adresse ist erforderlich.</small>
      }
      @if (form.controls.email.hasError('email')) {
        <small>Bitte eine gültige E-Mail-Adresse angeben.</small>
      }
    </label>

    <label class="auth-field">
      <span>Passwort</span>
      <input
        class="input"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        required
      />
      @if (form.controls.password.hasError('required') && form.controls.password.touched) {
        <small>Passwort ist erforderlich.</small>
      }
    </label>

    <div class="auth-actions">
      <a routerLink="/forgot-password" class="auth-link">Passwort vergessen?</a>
    </div>

    <button
      mat-flat-button
      color="primary"
      type="submit"
      class="auth-submit"
      [disabled]="submitting()"
    >
      @if (submitting()) {
        <mat-progress-spinner diameter="20" mode="indeterminate" />
      } @else {
        Anmelden
      }
    </button>

    <p class="auth-foot">
      Noch kein Konto? <a routerLink="/register" class="auth-link">Jetzt registrieren</a>
    </p>
  </form>
</app-auth-shell>
