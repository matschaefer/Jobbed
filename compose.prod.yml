name: jobbed

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobbed
      POSTGRES_USER: jobbed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobbed -d jobbed"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [jobbed]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DEMO_DATA_ENABLED: "false"
      DEMO_MODE_ENABLED: ${DEMO_MODE_ENABLED:-true}
      DEMO_MODE_EMAIL: ${DEMO_MODE_EMAIL:-demo@jobbed.local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jobbed
      SPRING_DATASOURCE_USERNAME: jobbed
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      APP_FRONTEND_BASE_URL: https://${DOMAIN:?DOMAIN must be set}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN}
      AUTH_COOKIE_SECURE: "true"
      AUTH_COOKIE_SAME_SITE: Strict
      MAIL_HOST: ${MAIL_HOST:?MAIL_HOST must be set}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:?MAIL_USERNAME must be set}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?MAIL_PASSWORD must be set}
      MAIL_FROM: ${MAIL_FROM:?MAIL_FROM must be set}
      FILE_STORAGE_LOCAL_PATH: /app/uploads
      FILE_UPLOAD_MAX_SIZE_MB: ${FILE_UPLOAD_MAX_SIZE_MB:-10}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-5-mini}
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [jobbed]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [jobbed]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [jobbed]

volumes:
  postgres-data:
  backend-uploads:
  caddy-data:
  caddy-config:

networks:
  jobbed:
    driver: bridge
