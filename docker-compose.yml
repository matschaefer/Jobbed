name: jobbed
# ============================================================================
# Jobbed – lokale Gesamt-Umgebung
# Start:  docker compose up --build
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobbed-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobbed}
      POSTGRES_USER: ${POSTGRES_USER:-jobbed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobbed}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobbed} -d ${POSTGRES_DB:-jobbed}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jobbed

  mailpit:
    image: axllent/mailpit:latest
    container_name: jobbed-mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # Web-UI
      - "${MAIL_PORT:-1025}:1025"         # SMTP
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - jobbed

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobbed-backend
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DEMO_DATA_ENABLED: ${DEMO_DATA_ENABLED:-true}
      DEMO_MODE_ENABLED: ${DEMO_MODE_ENABLED:-true}
      DEMO_MODE_EMAIL: ${DEMO_MODE_EMAIL:-demo@jobbed.local}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/jobbed}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-jobbed}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-jobbed}
      JWT_SECRET: ${JWT_SECRET:-please-generate-a-strong-base64-secret-of-at-least-32-bytes}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-900}
      JWT_REFRESH_TOKEN_TTL_SECONDS: ${JWT_REFRESH_TOKEN_TTL_SECONDS:-604800}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:80}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Strict}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@jobbed.local}
      FILE_STORAGE_LOCAL_PATH: ${FILE_STORAGE_LOCAL_PATH:-/app/uploads}
      FILE_UPLOAD_MAX_SIZE_MB: ${FILE_UPLOAD_MAX_SIZE_MB:-10}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-5-mini}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - jobbed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobbed-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - jobbed

volumes:
  postgres-data:
  backend-uploads:

networks:
  jobbed:
    driver: bridge
