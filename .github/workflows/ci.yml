name: Jobbed CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Backend testen
        working-directory: backend
        run: ./mvnw -B verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Abhängigkeiten installieren
        working-directory: frontend
        run: npm ci
      - name: Production dependency audit
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Unit-Tests
        working-directory: frontend
        run: npm run test:ci
      - name: Produktions-Build
        working-directory: frontend
        run: npm run build

  containers:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker-Images bauen
        run: docker compose build

  e2e:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend-Abhängigkeiten installieren
        working-directory: frontend
        run: npm ci
      - name: Browser installieren
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Jobbed-Stack starten
        run: docker compose up -d --build
      - name: Auf Health-Checks warten
        run: |
          timeout 120 sh -c 'until curl -fsS http://localhost/ >/dev/null && curl -fsS http://localhost:8080/actuator/health >/dev/null; do sleep 2; done'
      - name: E2E-Szenarien
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost
        run: npm run e2e
      - name: Container-Logs bei Fehlern
        if: failure()
        run: docker compose logs --no-color
